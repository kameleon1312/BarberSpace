<!doctype html>
<html lang="pl">

    <!-- ── Favicon ── -->
    <link rel="icon" type="image/png" href="/favicon.png" />

    <!-- ── Primary SEO ── -->
    <title>BarberSpace — Premium Strzyżenie i Broda | Night Studio</title>

      content="BarberSpace — premium salon barberski. Precyzyjne strzyżenia, broda i skin fade w klimacie night studio. Rezerwacja online w 20 sekund. Warszawa."

    <!-- ── Open Graph ── -->
    <meta property="og:type" content="website" />

    <meta property="og:image:height" content="630" />

    <meta name="twitter:card" content="summary_large_image" />

    <!-- ── Structured Data — LocalBusiness (HairSalon) ── -->
    <script type="application/ld+json">

        "postalCode": "00-000",
        "addressCountry": "PL"
      },
      "geo": {
        "@type": "GeoCoordinates",
        "latitude": 52.2297,
        "longitude": 21.0122
      },
